name: Auto Docker (GHCR)

# 当推送 v* 版本标签时自动构建 Docker 镜像并推送到 GitHub Container Registry。
# 只使用 GitHub 自带的 ghcr.io，不依赖 Docker Hub / 阿里云等外部仓库。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image and tags
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "tag=$TAG"       >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_ENV"
          echo "image=$IMAGE"   >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.image }}:${{ env.tag }}
            ${{ env.image }}:${{ env.version }}
            ${{ env.image }}:latest
          build-args: |
            BUILD_VERSION=${{ env.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
